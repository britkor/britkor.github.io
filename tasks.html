<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Britkor - Tasks</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/tasks.css">
</head>
<body>
    <div class="header">
        <h1>britkor</h1>
        <a href="profile.html">
            <div class="profile-avatar">
                <img src="assets/circle-user.svg" alt="Profile">
            </div>
        </a>
    </div>

    <div class="content">
        <div class="tasks-header">
            <h2>Available Tasks</h2>
            <div class="view-switch">
                <a href="tasks.html" class="switch-btn active">
                    <img src="assets/list.svg" width="14" height="14" alt="List" style="vertical-align:-2px;margin-right:4px;"> List
                </a>
                <a href="tasks-map.html" class="switch-btn">
                    <img src="assets/map.svg" width="14" height="14" alt="Map" style="vertical-align:-2px;margin-right:4px;"> Map
                </a>
            </div>
        </div>

        <a href="detail.html" class="card-link">
            <div class="card task-card">
                <span class="card-icon">🧹</span>
                <div class="card-info">
                    <h3>Clean my apartment</h3>
                    <p>Casablanca · 2 hours ago</p>
                </div>
                <span class="task-price">150 MAD</span>
            </div>
        </a>

        <a href="detail.html" class="card-link">
            <div class="card task-card">
                <span class="card-icon">📦</span>
                <div class="card-info">
                    <h3>Move furniture</h3>
                    <p>Casablanca · 5 hours ago</p>
                </div>
                <span class="task-price">300 MAD</span>
            </div>
        </a>

        <a href="detail.html" class="card-link">
            <div class="card task-card">
                <span class="card-icon">🔧</span>
                <div class="card-info">
                    <h3>Fix kitchen pipe</h3>
                    <p>Casablanca · 1 day ago</p>
                </div>
                <span class="task-price">200 MAD</span>
            </div>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="home.html">Home</a>
        <a href="tasks.html" class="active">Tasks</a>
        <a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
    </div>
</body>
</html>
