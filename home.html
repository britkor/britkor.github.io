<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Britkor - Home</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <div class="header">
        <h1>britkor</h1>
        <a href="profile.html">
            <div class="profile-avatar">
                <img src="assets/circle-user.svg" alt="Profile">
            </div>
        </a>
    </div>

    <div class="content">
        <p class="welcome">Welcome, <span class="at">@</span><span class="name">user</span></p>
        <p class="subtitle">What would you like to do today?</p>

        <a href="tasks.html" class="card-link">
            <div class="card">
                <span class="card-icon">
                    <img src="assets/search.svg" width="28" height="28" alt="Search">
                </span>
                <div class="card-info">
                    <h3>Browse Tasks</h3>
                    <p>Find available tasks near you on the map</p>
                </div>
                <span class="card-arrow">›</span>
            </div>
        </a>

        <a href="create-task.html" class="card-link">
            <div class="card">
                <span class="card-icon">
                    <img src="assets/memo-pencil.svg" width="28" height="28" alt="Post">
                </span>
                <div class="card-info">
                    <h3>Post a Task</h3>
                    <p>Get help with cleaning, moving, repairs</p>
                </div>
                <span class="card-arrow">›</span>
            </div>
        </a>

        <div class="stats">
            <div class="stat">
                <span class="stat-number">12</span>
                <span class="stat-label">Tasks Open</span>
            </div>
            <div class="stat">
                <span class="stat-number">48</span>
                <span class="stat-label">Workers</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="active">Home</a>
        <a href="tasks.html">Tasks</a>
        <a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
    </div>
    <script src="js/home.js"></script>
</body>
</html>
